# Single Source of Truth für die Pipeline-Konfiguration.
# Werte aus CLAUDE_patch_v4.md (Abschnitt 3) plus allgemeine Pfade/Defaults.

general:
  seed: 42
  timezone: Europe/Berlin
  period_start: "2023-01-01"
  period_end: "2026-03-13"        # erweitert ggü. Brief (§4.3) auf reales Inventar

paths:
  raw_rlm: data/raw/rlm
  raw_weather: data/raw/weather
  raw_prices: data/raw/prices
  interim: data/interim
  processed: data/processed
  models: models

co2:
  default_g_per_kwh: 380          # Jahresmittel DE; stündliche Variante als Sensitivität (methodology.md)
  hourly_source: energy_charts_public_power

clustering:
  # ROLLE: Tagesprofil-Clustering ist ausschließlich Peer-Gruppierung für ARIMA
  # (ein ARIMA je Peer-Gruppe). NICHT für den Autoencoder (der wird pro Kategorie
  # trainiert). Segment-Clustering (unten) ist die Diagnose-Schicht für ALLE Methoden.
  tagesprofile:
    enabled: true
    k_values: [2, 3, 4, 5]        # Suchraum für Silhouette/Elbow
    dim: 96                        # 24h × 4 Werte (15-min)
    k_final: 3                     # fachlich: konsistent mit 01_eda (3 typische Tagesprofile),
                                   # homogene Peer-Gruppen für ARIMA; Silhouette=2 ist nur untere Schranke
  segmente:
    enabled: true
    segments:
      - name: nachts
        start_hour: 0
        end_hour: 6
      - name: vormittag
        start_hour: 6
        end_hour: 11
      - name: mittag
        start_hour: 11
        end_hour: 14
      - name: nachmittag
        start_hour: 14
        end_hour: 22
    features_per_segment: [mean, max, std, slope]
    k_values: [2, 3, 4]            # Suchraum für Silhouette/Elbow
    # Diagnose via DISTANZ zum nächsten Zentrum -> k niedrig-sensitiv (Distanz trägt das Signal).
    k_final_per_segment:
      nachts: 3                    # distanz-robust: genug Prototypen für normale Variabilität
      vormittag: 3                 # distanz-robust
      mittag: 4                    # silhouette-getrieben: echte feinere Struktur (Silhouette-Max bei 4)
      nachmittag: 3                # distanz-robust
    distance_threshold_percentile: 99.0   # Default; Schwelle aus Train-min-Distanzen je Segment
    # Alternativen (Threshold-Sensitivität einheitlich in Schritt 11 / method_comparison):
    # distance_threshold_percentile: 97.5  # mehr Flags
    # distance_threshold_percentile: 99.9  # weniger Flags

models:
  zscore:
    enabled: true
    threshold: 3.0
    stl_period: 96                 # Tagesperiode: 24h auf 15-min-Basis (Default)
    stl_period_weekly: 672         # optional: Wochenperiode (7×96) für STL-Robustvergleich
  arima:
    enabled: true
    input: stl_deseasonalized      # Trend+Remainder (Saison via STL entfernt), nicht das reine Remainder
    selection: auto                # pmdarima.auto_arima; Fallback: AIC-Grid (statsmodels)
    seasonal: false                # Saison via STL period=96, NICHT via SARIMAX s=96 (zu langsam bei 15-min)
    one_model_per_cluster: true    # eine Ordnung je Peer-Gruppe, pro Site angewandt
    exog: [is_holiday]             # empirisch begründet: Anomalierate Feiertag ~2,3x erhöht (methodology.md)
  autoencoder:
    enabled: true
    variants: [dense, lstm]
    window_hours: 24
    one_model_per_category: true
    seed: 42

evaluation:
  precision_sample_size: 200
  kappa_pairwise: true
  inference_timing: true

comparison:
  # Schritt 11 (Methodenvergleich): Anteils-Schwelle für die Hoch-Aggregation
  # auf (site, date, segment). Gewählt nach X-Sweep im Notebook 06 — siehe
  # reports/methodology.md ("Methodenvergleich (Schritt 11)") und
  # reports/tables/06_method_comparison.md. Begründung: ARIMA-Sichtbarkeit
  # (Ratio 1,64 zum Cluster-Anker 0,64 %) wichtiger als rein numerische Anker-
  # Nähe; die Z-Score/ARIMA-Asymmetrie (kein gemeinsames X kalibriert beide
  # Punkt-Methoden auf dieselbe Flag-Rate) ist ein eigenständiger Befund.
  aggregation_threshold_pct: 0.25
